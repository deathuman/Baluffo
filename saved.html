<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Jobs</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="saved-page">
  <button class="btn back-btn theme-toggle-btn global-theme-toggle" type="button" aria-label="Switch theme">Theme</button>
  <div class="jobs-container">
    <div class="jobs-header">
      <h1>Saved Jobs</h1>
      <div class="header-actions">
        <button id="jobs-page-btn" class="btn back-btn" aria-label="Back to jobs listing">All Jobs</button>
        <button id="admin-page-btn" class="btn back-btn" aria-label="Go to administration page">Admin</button>
        <button id="saved-auth-sign-in-btn" class="btn back-btn" aria-label="Sign in">Sign in</button>
        <button id="saved-auth-sign-out-btn" class="btn back-btn hidden" aria-label="Sign out">Sign out</button>
      </div>
    </div>

    <p id="saved-auth-status" class="auth-status">Browsing as guest</p>
    <p id="saved-source-status" class="source-status">Sign in to view your saved jobs.</p>

    <div id="saved-jobs-list" class="jobs-list">
      <div class="loading">Loading saved jobs...</div>
    </div>

    <div class="saved-actions saved-actions-bottom">
      <button id="global-phase-override-btn" class="btn back-btn" disabled>Override Phase Lock</button>
      <button id="export-backup-btn" class="btn back-btn" disabled>Export Backup</button>
      <label class="backup-toggle">
        <input id="export-include-files" type="checkbox">
        Include files
      </label>
      <button id="import-backup-btn" class="btn back-btn" disabled>Import Backup</button>
      <input id="import-backup-input" type="file" accept="application/json" class="hidden">
    </div>
  </div>

  <button id="history-panel-toggle-btn" class="btn back-btn history-fab" aria-label="Open activity history" title="Open activity history">
    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
      <path fill="currentColor" d="M13 3a9 9 0 1 0 8.95 10h-2.02A7 7 0 1 1 13 5v3l4-4-4-4v3z"/>
      <path fill="currentColor" d="M12.5 8h-1.5v5l4.25 2.55.75-1.23-3.5-2.07z"/>
    </svg>
  </button>

  <aside id="activity-panel" class="activity-panel collapsed" aria-hidden="true">
    <div class="activity-panel-header">
      <h2>Activity History</h2>
      <div class="activity-panel-actions">
        <button id="activity-refresh-btn" class="btn back-btn" aria-label="Refresh activity">Refresh</button>
        <button id="activity-collapse-btn" class="btn back-btn" aria-label="Collapse activity panel">Minimize</button>
      </div>
    </div>
    <p id="activity-panel-status" class="source-status">Sign in to view history.</p>
    <div id="activity-panel-body" class="activity-panel-body">
      <div class="muted">No activity yet.</div>
    </div>
  </aside>

  <script src="local-data-client.js"></script>
  <script src="saved.js"></script>
</body>
</html>
