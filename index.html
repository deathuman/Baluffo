<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baluffo Jobs</title>
  <meta http-equiv="refresh" content="0; url=jobs.html">
  <script>
    (function () {
      const THEME_KEY = "baluffo_theme";
      let theme = "dark";
      const isDesktopRuntime = /(?:[?&])desktop=1(?:&|$)/.test(window.location.search);
      try {
        if (!isDesktopRuntime) {
          const stored = localStorage.getItem(THEME_KEY);
          if (stored === "dark" || stored === "light") {
            theme = stored;
          } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
            theme = "light";
          }
        }
      } catch (_) {}
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="jobs-entry-page">
  <button class="btn back-btn theme-toggle-btn global-theme-toggle" type="button" aria-label="Switch theme">Theme</button>
  <div class="jobs-container">
    <main class="container">
      <h1>Opening Jobs...</h1>
      <p>If you are not redirected automatically, continue to <a href="jobs.html">the jobs page</a>.</p>
      <noscript>
        <p>JavaScript is disabled, so automatic redirect is unavailable. Open <a href="jobs.html">jobs.html</a>.</p>
      </noscript>
    </main>
  </div>
  <script src="theme.js" defer></script>
  <script>
    window.location.replace("jobs.html");
  </script>
</body>
</html>
