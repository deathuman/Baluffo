name: build-portable-exe

on:
  workflow_dispatch:
    inputs:
      bundle_version:
        description: Bundle version override
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    runs-on: windows-latest
    env:
      BALUFFO_SYNC_BUILD_APP_ID: ${{ secrets.BALUFFO_SYNC_BUILD_APP_ID }}
      BALUFFO_SYNC_BUILD_INSTALLATION_ID: ${{ secrets.BALUFFO_SYNC_BUILD_INSTALLATION_ID }}
      BALUFFO_SYNC_BUILD_REPO: ${{ secrets.BALUFFO_SYNC_BUILD_REPO }}
      BALUFFO_SYNC_BUILD_PRIVATE_KEY_PEM: ${{ secrets.BALUFFO_SYNC_BUILD_PRIVATE_KEY_PEM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python desktop dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-desktop.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Resolve bundle version
        shell: pwsh
        run: |
          $version = "${{ inputs.bundle_version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $version = "${{ github.ref_name }}".TrimStart("v")
            } else {
              $version = "0.0.0-ci.${{ github.run_number }}"
            }
          }
          "BALUFFO_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare packaged sync config build inputs
        shell: pwsh
        run: |
          $appId = "$env:BALUFFO_SYNC_BUILD_APP_ID"
          $installId = "$env:BALUFFO_SYNC_BUILD_INSTALLATION_ID"
          $repo = "$env:BALUFFO_SYNC_BUILD_REPO"
          $privateKeyPem = "$env:BALUFFO_SYNC_BUILD_PRIVATE_KEY_PEM"

          if ([string]::IsNullOrWhiteSpace($appId)) { $appId = "100000" }
          if ([string]::IsNullOrWhiteSpace($installId)) { $installId = "100000" }
          if ([string]::IsNullOrWhiteSpace($repo)) { $repo = "${{ github.repository }}" }

          $isTagBuild = "${{ github.ref_type }}" -eq "tag"
          if ($isTagBuild -and [string]::IsNullOrWhiteSpace($privateKeyPem)) {
            throw "Missing BALUFFO_SYNC_BUILD_PRIVATE_KEY_PEM secret for tagged release build."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "baluffo-sync-app-private-key.pem"
          if ([string]::IsNullOrWhiteSpace($privateKeyPem)) {
            $placeholderPem = @(
              '-----BEGIN PRIVATE KEY-----',
              'QkFMVUZGTy1DSS1QTEFDRUhPTERFUg==',
              '-----END PRIVATE KEY-----'
            ) -join [Environment]::NewLine
            $placeholderPem | Set-Content -Path $keyPath -Encoding utf8
          } else {
            if ($privateKeyPem.Contains('\n') -and -not $privateKeyPem.Contains("`n")) {
              $privateKeyPem = $privateKeyPem.Replace('\n', "`n")
            }
            $privateKeyPem | Set-Content -Path $keyPath -Encoding utf8
          }

          "BALUFFO_SYNC_BUILD_APP_ID=$appId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BALUFFO_SYNC_BUILD_INSTALLATION_ID=$installId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BALUFFO_SYNC_BUILD_REPO=$repo" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BALUFFO_SYNC_BUILD_PRIVATE_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run release gates
        run: |
          npm run test:frontend:unit
          npm run test:py
          npm run test:frontend:packaged

      - name: Build portable executable
        run: python scripts/build_portable_exe.py --bundle-version ${{ env.BALUFFO_VERSION }}

      - name: Build ship bundle
        run: py -3.13 scripts/build_ship_bundle.py --bundle-version ${{ env.BALUFFO_VERSION }}

      - name: Create ship bundle zip
        shell: pwsh
        run: |
          $shipZip = "dist/baluffo-ship-${{ env.BALUFFO_VERSION }}.zip"
          if (Test-Path $shipZip) {
            Remove-Item $shipZip -Force
          }
          Compress-Archive -Path dist/baluffo-ship -DestinationPath $shipZip -Force

      - name: Extract release notes
        shell: pwsh
        run: |
          $lines = Get-Content SHIP_PACKAGE.md
          $start = $lines.IndexOf("## Release Notes")
          $end = $lines.IndexOf("## PR Description")
          if ($start -lt 0) {
            throw "Could not find '## Release Notes' in SHIP_PACKAGE.md"
          }
          if ($end -lt 0) {
            $end = $lines.Count
          }
          if ($end -le $start) {
            throw "Invalid release notes section bounds in SHIP_PACKAGE.md"
          }
          $notes = $lines[$start..($end - 1)]
          Set-Content -Path release-notes.md -Value $notes

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: baluffo-portable-${{ env.BALUFFO_VERSION }}
          path: dist/baluffo-portable-${{ env.BALUFFO_VERSION }}.zip

      - name: Upload ship artifact
        uses: actions/upload-artifact@v4
        with:
          name: baluffo-ship-${{ env.BALUFFO_VERSION }}
          path: dist/baluffo-ship-${{ env.BALUFFO_VERSION }}.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Baluffo ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            dist/baluffo-portable-${{ env.BALUFFO_VERSION }}.zip
            dist/baluffo-ship-${{ env.BALUFFO_VERSION }}.zip
